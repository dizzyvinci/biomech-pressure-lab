<text x="516.6588235294117" y="228" font-size="9" fill="#0f172a" font-weight="700" text-anchor="start">313 kPa</text>
<text x="356" y="252" font-size="9.5" fill="#0f172a" font-weight="700" text-anchor="start">Basketball land</text>
<rect x="356" y="258" width="420" height="16" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
