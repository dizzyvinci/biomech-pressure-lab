<text x="157.0" y="206.3" font-size="8" fill="#ffffff" font-weight="700" text-anchor="middle">246</text>
<circle cx="172" cy="200" r="14" fill="#f59e0b" opacity="0.85" stroke="#fff" stroke-width="1.3"/>
<text x="172.0" y="203.5" font-size="8" fill="#ffffff" font-weight="700" text-anchor="middle">225</text>
<circle cx="187" cy="203" r="14" fill="#f59e0b" opacity="0.85" stroke="#fff" stroke-width="1.3"/>
<text x="187.0" y="206.3" font-size="8" fill="#ffffff" font-weight="700" text-anchor="middle">180</text>
<circle cx="202" cy="208" r="14" fill="#2563eb" opacity="0.85" stroke="#fff" stroke-width="1.3"/>
<text x="202.0" y="211.9" font-size="8" fill="#ffffff" font-weight="700" text-anchor="middle">150</text>
<circle cx="136" cy="150" r="14" fill="#e11d48" opacity="0.85" stroke="#fff" stroke-width="1.3"/>
<text x="136.0" y="153.1" font-size="8" fill="#ffffff" font-weight="700" text-anchor="middle">280</text>
<circle cx="181" cy="141" r="14" fill="#2563eb" opacity="0.85" stroke="#fff" stroke-width="1.3"/>
<text x="181.0" y="144.70000000000002" font-size="8" fill="#ffffff" font-weight="700" text-anchor="middle">170</text>
<text x="40" y="420" font-size="9" fill="#64748b" font-weight="400" text-anchor="start">● ≥250  ● 180–249  ● &lt;180 kPa  ·  hallux 280 &amp; heel 264 lead</text>
<text x="40" y="435" font-size="8.5" fill="#64748b" font-weight="400" text-anchor="start">(healthy adults; hallux/heel/met1–3 published)</text>
<rect x="340" y="74" width="536" height="372" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.6"/>
