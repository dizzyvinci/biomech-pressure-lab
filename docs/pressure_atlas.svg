<svg viewBox="0 0 900 490" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
<title>Plantar pressure atlas: a footprint labeled with published barefoot-walking peak pressures per zone (hallux 280, heel 264, met1 248, met2 246, met3 225 kPa) and a bar chart of peak central-forefoot pressure by activity (standing 53, walking 246, running 313, basketball landing 403, basketball hallux 794 kPa) against the 200/450/750 kPa clinical thresholds.</title>
<desc>Left: footprint with per-zone kPa colored by magnitude. Right: peak pressure by activity vs ulcer thresholds.</desc>
<defs><marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#64748b"/></marker><marker id="arr" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#e11d48"/></marker></defs>
<rect x="4" y="4" width="892" height="482" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
<text x="24" y="36" font-size="18" fill="#0f172a" font-weight="700" text-anchor="start">Plantar pressure atlas — real kPa (bottom of the foot)</text><text x="24" y="55" font-size="11.5" fill="#475569" font-weight="400" text-anchor="start">Published peak pressures per foot region; the engine compares you to these, not guesses</text>
<rect x="24" y="74" width="300" height="372" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.6"/>
<text x="40" y="100" font-size="12" fill="#0f172a" font-weight="700" text-anchor="start">Barefoot walking — peak kPa</text>
<ellipse cx="172" cy="214" rx="75" ry="95" fill="#dbe4ef" stroke="#94a3b8" stroke-width="1.3"/><ellipse cx="172" cy="360" rx="54" ry="73" fill="#dbe4ef" stroke="#94a3b8" stroke-width="1.3"/><rect x="118" y="228" width="108" height="95" fill="#dbe4ef"/>
