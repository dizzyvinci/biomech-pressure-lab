<text x="149.5" y="391.1" font-size="8" fill="#ffffff" font-weight="700" text-anchor="middle">264</text>
<circle cx="194" cy="388" r="14" fill="#f59e0b" opacity="0.85" stroke="#fff" stroke-width="1.3"/>
<text x="194.5" y="391.1" font-size="8" fill="#ffffff" font-weight="700" text-anchor="middle">230</text>
<circle cx="172" cy="284" r="14" fill="#2563eb" opacity="0.85" stroke="#fff" stroke-width="1.3"/>
<text x="172.0" y="287.5" font-size="8" fill="#ffffff" font-weight="700" text-anchor="middle">110</text>
