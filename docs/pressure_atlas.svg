<text x="754.3294117647059" y="312" font-size="9" fill="#0f172a" font-weight="700" text-anchor="start">794 kPa</text>
<line x1="455" y1="120" x2="455" y2="336" stroke="#0f172a" stroke-width="1" stroke-dasharray="3 3"/>
<text x="454.8235294117647" y="350" font-size="7.5" fill="#0f172a" font-weight="700" text-anchor="middle">200 in-shoe</text>
<line x1="578" y1="120" x2="578" y2="336" stroke="#7c2d12" stroke-width="1" stroke-dasharray="3 3"/>
<text x="578.3529411764706" y="350" font-size="7.5" fill="#7c2d12" font-weight="700" text-anchor="middle">450 barefoot</text>
<line x1="727" y1="120" x2="727" y2="336" stroke="#7c2d12" stroke-width="1" stroke-dasharray="3 3"/>
<text x="726.5882352941177" y="350" font-size="7.5" fill="#7c2d12" font-weight="700" text-anchor="middle">750</text>
<text x="356" y="372" font-size="8.5" fill="#64748b" font-weight="400" text-anchor="start">Dashed = diabetic/neuropathic-tissue ulcer thresholds (200 kPa in-shoe;</text>
<text x="356" y="385" font-size="8.5" fill="#64748b" font-weight="400" text-anchor="start">450/750 barefoot). Healthy athletes routinely exceed them transiently —</text>
<text x="356" y="398" font-size="8.5" fill="#64748b" font-weight="400" text-anchor="start">e.g. basketball-landing hallux ~794 kPa. Context matters, not a hard cap.</text>
<text x="356" y="424" font-size="8" fill="#64748b" font-weight="400" text-anchor="start">Sources: walking PMC2902454 · standing Cavanagh · running PMC5112690 ·</text>
<text x="356" y="436" font-size="8" fill="#64748b" font-weight="400" text-anchor="start">basketball LER · thresholds PMC10882031 (refs/plantar_norms.json).</text>
<text x="24" y="470" font-size="9.5" fill="#64748b" font-weight="400" text-anchor="start">Every number is confidence-flagged (published / estimated) and gets more rigid as sources + our own captures are added.</text>
</svg>
