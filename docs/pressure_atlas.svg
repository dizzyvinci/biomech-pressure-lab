<rect x="356" y="132" width="26" height="16" rx="4" fill="#64748b"/>
<text x="388.18823529411765" y="144" font-size="9" fill="#0f172a" font-weight="700" text-anchor="start">53 kPa</text>
<text x="356" y="168" font-size="9.5" fill="#0f172a" font-weight="700" text-anchor="start">Walking</text>
<rect x="356" y="174" width="420" height="16" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<rect x="356" y="174" width="122" height="16" rx="4" fill="#2563eb"/>
<text x="483.5529411764706" y="186" font-size="9" fill="#0f172a" font-weight="700" text-anchor="start">246 kPa</text>
