<svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
<title>Two software modules from one sensor set: pressure (interpret.py) yields a hot-spot map and insole directives; balance (balance.py) yields sway metrics, Romberg and fall-risk flags. Example values from the worked sample.</title>
<desc>Top branch pressure module with a mini heatmap and example directives; bottom branch balance module with sway ellipses and Romberg example.</desc>
<defs><marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#64748b"/></marker><marker id="arr" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#e11d48"/></marker></defs>
<rect x="4" y="4" width="892" height="512" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
<text x="24" y="36" font-size="18" fill="#0f172a" font-weight="700" text-anchor="start">The software — two modules from one sensor set</text><text x="24" y="55" font-size="11.5" fill="#475569" font-weight="400" text-anchor="start">The same FSR + IMU logs (calibrated to kPa) drive foot-pressure AND balance analysis</text>
<rect x="24" y="74" width="150" height="40" rx="8" fill="#eef2f7" stroke="#94a3b8" stroke-width="1.4"/>
<text x="99" y="92" font-size="11" fill="#0f172a" font-weight="700" text-anchor="middle">Logs on SD</text>
<text x="99" y="106" font-size="8" fill="#64748b" font-weight="400" text-anchor="middle">FSR×8 + IMU</text>
<rect x="24" y="128" width="150" height="40" rx="8" fill="#fdecef" stroke="#e11d48" stroke-width="1.6"/>
<text x="99" y="146" font-size="11" fill="#0f172a" font-weight="700" text-anchor="middle">calibrate.py</text>
<text x="99" y="160" font-size="8" fill="#64748b" font-weight="400" text-anchor="middle">ADC → kPa (R²=1.0)</text>
<path d="M174 148 L210 148 L210 210 L250 210" fill="none" stroke="#64748b" stroke-width="1.6" marker-end="url(#ar)"/>
<path d="M174 148 L210 148 L210 360 L250 360" fill="none" stroke="#64748b" stroke-width="1.6" marker-end="url(#ar)"/>
<rect x="250" y="188" width="620" height="150" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.6"/>
<rect x="250" y="188" width="620" height="26" rx="10" fill="#0f172a"/>
<text x="266" y="206" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="start">PRESSURE — foot pain / insole  (interpret.py)</text>
<ellipse cx="320" cy="254" rx="30" ry="34" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.3"/><ellipse cx="320" cy="306" rx="22" ry="26" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.3"/><rect x="298" y="259" width="43" height="34" fill="#e2e8f0"/>
<circle cx="311" cy="316" r="22" fill="#e11d48" opacity="0.75"/>
<circle cx="311" cy="316" r="12" fill="#f59e0b" opacity="0.9"/>
<circle cx="329" cy="316" r="7" fill="#2563eb" opacity="0.55"/>
<circle cx="308" cy="252" r="7" fill="#2563eb" opacity="0.55"/>
<circle cx="320" cy="250" r="7" fill="#2563eb" opacity="0.55"/>
<circle cx="332" cy="252" r="7" fill="#2563eb" opacity="0.55"/>
<text x="320" y="340" font-size="8.5" fill="#64748b" font-weight="400" text-anchor="middle">peak-pressure map</text>
<text x="400" y="236" font-size="9.5" fill="#475569" font-weight="400" text-anchor="start">• peak · impulse (∫F·dt)</text>
<text x="400" y="253" font-size="9.5" fill="#475569" font-weight="400" text-anchor="start">• center-of-pressure path</text>
<text x="400" y="270" font-size="9.5" fill="#475569" font-weight="400" text-anchor="start">• medial/lateral · heel/forefoot</text>
<text x="400" y="287" font-size="9.5" fill="#475569" font-weight="400" text-anchor="start">• loading rate · cadence</text>
<text x="400" y="304" font-size="9.5" fill="#475569" font-weight="400" text-anchor="start">• barefoot vs shoe delta</text>
<rect x="600" y="224" width="258" height="96" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.2"/>
<text x="614" y="244" font-size="9.5" fill="#0f172a" font-weight="700" text-anchor="start">Example (worked sample)</text>
<text x="614" y="262" font-size="9" fill="#475569" font-weight="400" text-anchor="start">heel_med hot spot — 40% of load</text>
<text x="614" y="278" font-size="9" fill="#475569" font-weight="400" text-anchor="start">medial 56% vs lateral 25%</text>
<text x="614" y="294" font-size="9.5" fill="#e11d48" font-weight="700" text-anchor="start">→ aggressive relief + medial post</text>
<text x="614" y="310" font-size="9.5" fill="#e11d48" font-weight="700" text-anchor="start">→ soft heel cushion</text>
<rect x="250" y="350" width="620" height="150" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.6"/>
<rect x="250" y="350" width="620" height="26" rx="10" fill="#0f172a"/>
<text x="266" y="368" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="start">BALANCE — stability / fall risk  (balance.py)</text>
<ellipse cx="320" cy="432" rx="34" ry="24" fill="none" stroke="#e11d48" stroke-width="1.8" stroke-dasharray="4 3"/>
<ellipse cx="320" cy="432" rx="15" ry="11" fill="none" stroke="#16a34a" stroke-width="1.8"/>
<circle cx="320" cy="432" r="2" fill="#0f172a"/>
<text x="320" y="476" font-size="8.5" fill="#64748b" font-weight="400" text-anchor="middle">sway ellipse</text>
<text x="280" y="402" font-size="8" fill="#e11d48" font-weight="700" text-anchor="start">eyes-closed</text>
<text x="340" y="434" font-size="8" fill="#16a34a" font-weight="700" text-anchor="start">eyes-open</text>
<text x="400" y="398" font-size="9.5" fill="#475569" font-weight="400" text-anchor="start">• 95% sway-ellipse area</text>
<text x="400" y="415" font-size="9.5" fill="#475569" font-weight="400" text-anchor="start">• path length · velocity</text>
<text x="400" y="432" font-size="9.5" fill="#475569" font-weight="400" text-anchor="start">• ML vs AP direction</text>
<text x="400" y="449" font-size="9.5" fill="#475569" font-weight="400" text-anchor="start">• trunk sway (IMU)</text>
<text x="400" y="466" font-size="9.5" fill="#475569" font-weight="400" text-anchor="start">• Romberg quotient (EC/EO)</text>
<rect x="600" y="386" width="258" height="96" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.2"/>
<text x="614" y="406" font-size="9.5" fill="#0f172a" font-weight="700" text-anchor="start">Example (worked sample)</text>
<text x="614" y="424" font-size="9" fill="#475569" font-weight="400" text-anchor="start">eyes-open 211 mm² → closed 770 mm²</text>
<text x="614" y="440" font-size="9" fill="#475569" font-weight="400" text-anchor="start">Romberg = 3.6  (&gt;2 = vision-reliant)</text>
<text x="614" y="456" font-size="9.5" fill="#e11d48" font-weight="700" text-anchor="start">→ lateral support · balance cues</text>
<text x="614" y="472" font-size="9.5" fill="#e11d48" font-weight="700" text-anchor="start">→ fall-risk screen</text>
</svg>
