<svg viewBox="0 0 920 630" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
<title>Smart-insole biomechanics rig: sensor placement, wiring signal flow, and the measure-print-remeasure loop</title>
<desc>Left: a foot outline with eight numbered FSR sensor positions and a channel legend. Right: signal flow from 8 FSRs through a multiplexer into the ESP32-S3, out to SD card and BLE, with IMU and battery feeding the ESP32. Bottom: the loop record, analyze, hot spot, print insole, re-measure.</desc>
<rect x="4" y="4" width="912" height="622" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
<text x="24" y="36" font-size="18" font-weight="700" fill="#0f172a">Smart-insole rig — how it fits together</text>
<text x="24" y="56" font-size="12" fill="#e11d48">● = FSR pressure sensor · red = your hot spot</text>
<text x="24" y="90" font-size="13" font-weight="700" fill="#334155">1  Where the 8 sensors go</text>
<path d="M170 440 C135 440 112 428 112 400 C96 350 96 300 104 250 C108 210 106 165 116 128 C120 100 145 94 162 100 C180 92 200 96 206 122 C226 165 232 210 230 255 C236 320 230 400 218 424 C210 440 192 440 170 440 Z" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
<g fill="#e11d48">
<circle cx="131" cy="420" r="11"/><circle cx="209" cy="420" r="11"/>
<circle cx="170" cy="288" r="11"/><circle cx="118" cy="190" r="11"/>
<circle cx="170" cy="180" r="11"/><circle cx="222" cy="190" r="11"/>
<circle cx="116" cy="116" r="11"/><circle cx="183" cy="104" r="11"/>
</g>
<g fill="#ffffff" font-size="11" font-weight="700" text-anchor="middle">
<text x="131" y="424">0</text><text x="209" y="424">1</text><text x="170" y="292">2</text><text x="118" y="194">3</text>
<text x="170" y="184">4</text><text x="222" y="194">5</text><text x="116" y="120">6</text><text x="183" y="108">7</text>
</g>
<g font-size="11" fill="#475569">
<text x="40" y="484">0  heel-med</text><text x="175" y="484">4  met3</text>
<text x="40" y="504">1  heel-lat</text><text x="175" y="504">5  met5</text>
<text x="40" y="524">2  midfoot</text><text x="175" y="524">6  hallux</text>
<text x="40" y="544">3  met1</text><text x="175" y="544">7  toes</text>
</g>
<defs><marker id="ah" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#64748b"/></marker></defs>
<text x="360" y="90" font-size="13" font-weight="700" fill="#334155">2  Signal flow (the wiring)</text>
<rect x="352" y="128" width="112" height="46" rx="8" fill="#eef2f7" stroke="#94a3b8" stroke-width="1.5"/>
<text x="408" y="150" font-size="12" font-weight="700" fill="#0f172a" text-anchor="middle">8x FSR</text>
<text x="408" y="165" font-size="9" fill="#64748b" text-anchor="middle">force pads</text>
<rect x="494" y="128" width="112" height="46" rx="8" fill="#eef2f7" stroke="#94a3b8" stroke-width="1.5"/>
<text x="550" y="150" font-size="12" font-weight="700" fill="#0f172a" text-anchor="middle">CD74HC4067</text>
<text x="550" y="165" font-size="9" fill="#64748b" text-anchor="middle">16-ch mux</text>
<rect x="636" y="122" width="118" height="58" rx="8" fill="#fdecef" stroke="#e11d48" stroke-width="1.8"/>
<text x="695" y="146" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">ESP32-S3</text>
<text x="695" y="163" font-size="9" fill="#64748b" text-anchor="middle">logger @100 Hz</text>
<rect x="784" y="128" width="112" height="46" rx="8" fill="#eef2f7" stroke="#94a3b8" stroke-width="1.5"/>
<text x="840" y="150" font-size="12" font-weight="700" fill="#0f172a" text-anchor="middle">SD + BLE</text>
<text x="840" y="165" font-size="9" fill="#64748b" text-anchor="middle">CSV out</text>
<line x1="464" y1="151" x2="490" y2="151" stroke="#64748b" stroke-width="1.6" marker-end="url(#ah)"/>
<line x1="606" y1="151" x2="632" y2="151" stroke="#64748b" stroke-width="1.6" marker-end="url(#ah)"/>
<text x="619" y="143" font-size="8" fill="#64748b" text-anchor="middle">ADC</text>
<line x1="754" y1="151" x2="780" y2="151" stroke="#64748b" stroke-width="1.6" marker-end="url(#ah)"/>
<rect x="524" y="238" width="118" height="42" rx="8" fill="#eef2f7" stroke="#94a3b8" stroke-width="1.5"/>
<text x="583" y="258" font-size="12" font-weight="700" fill="#0f172a" text-anchor="middle">BNO085 IMU</text>
<text x="583" y="272" font-size="9" fill="#64748b" text-anchor="middle">motion · I2C</text>
<rect x="664" y="238" width="130" height="42" rx="8" fill="#eef2f7" stroke="#94a3b8" stroke-width="1.5"/>
<text x="729" y="258" font-size="12" font-weight="700" fill="#0f172a" text-anchor="middle">LiPo + TP4056</text>
<text x="729" y="272" font-size="9" fill="#64748b" text-anchor="middle">power</text>
<line x1="600" y1="238" x2="672" y2="182" stroke="#64748b" stroke-width="1.6" marker-end="url(#ah)"/>
<line x1="722" y1="238" x2="710" y2="182" stroke="#64748b" stroke-width="1.6" marker-end="url(#ah)"/>
<text x="360" y="330" font-size="13" font-weight="700" fill="#334155">3  The loop — measure to print to re-measure</text>
<rect x="352" y="350" width="104" height="44" rx="8" fill="#eef2f7" stroke="#94a3b8" stroke-width="1.5"/>
<text x="404" y="370" font-size="11" font-weight="700" fill="#0f172a" text-anchor="middle">Record</text>
<text x="404" y="384" font-size="8" fill="#64748b" text-anchor="middle">walk·stairs·pivot</text>
<rect x="472" y="350" width="104" height="44" rx="8" fill="#eef2f7" stroke="#94a3b8" stroke-width="1.5"/>
<text x="524" y="370" font-size="11" font-weight="700" fill="#0f172a" text-anchor="middle">Analyze</text>
<text x="524" y="384" font-size="8" fill="#64748b" text-anchor="middle">calibrate → kPa</text>
<rect x="592" y="350" width="104" height="44" rx="8" fill="#fdecef" stroke="#e11d48" stroke-width="1.8"/>
<text x="644" y="370" font-size="11" font-weight="700" fill="#0f172a" text-anchor="middle">Hot spot</text>
<text x="644" y="384" font-size="8" fill="#64748b" text-anchor="middle">+ directives</text>
<rect x="712" y="350" width="112" height="44" rx="8" fill="#eef2f7" stroke="#94a3b8" stroke-width="1.5"/>
<text x="768" y="370" font-size="11" font-weight="700" fill="#0f172a" text-anchor="middle">Print insole</text>
<text x="768" y="384" font-size="8" fill="#64748b" text-anchor="middle">relief window</text>
<line x1="456" y1="372" x2="470" y2="372" stroke="#64748b" stroke-width="1.6" marker-end="url(#ah)"/>
<line x1="576" y1="372" x2="590" y2="372" stroke="#64748b" stroke-width="1.6" marker-end="url(#ah)"/>
<line x1="696" y1="372" x2="710" y2="372" stroke="#64748b" stroke-width="1.6" marker-end="url(#ah)"/>
<path d="M768 394 L768 420 L404 420 L404 396" fill="none" stroke="#64748b" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#ah)"/>
<text x="586" y="435" font-size="9" fill="#64748b" text-anchor="middle">re-measure with the new insole, confirm the load dropped, iterate</text>
<text x="360" y="470" font-size="11" fill="#475569">No printer? Steps 1-2 need zero printing (FSRs on cheap foam). Only the insole in 3 needs FDM TPU.</text>
</svg>
