<svg viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
<title>Kinetic-chain injury map: foot-loading signatures map to injuries up the chain — high vGRF/loading rate -&gt; ACL and tibial stress; L/R asymmetry &gt;10-15% -&gt; non-contact ACL and hamstring; overstride in sprint -&gt; hamstring; medial collapse -&gt; shin splints/plantar fasciitis/knee valgus; lateral overload -&gt; ankle sprain/5th met/IT band. Foot markers are anatomical (mm).</title>
<desc>Left: a leg with injury sites (hamstring, ACL, shin, ankle, foot). Right: five foot-signature -&gt; chain-injury rows with the sport.</desc>
<defs><marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#64748b"/></marker><marker id="arr" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#e11d48"/></marker></defs>
<rect x="4" y="4" width="892" height="472" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
<text x="24" y="36" font-size="18" fill="#0f172a" font-weight="700" text-anchor="start">Kinetic chain — it's all connected to the foot</text><text x="24" y="55" font-size="11.5" fill="#475569" font-weight="400" text-anchor="start">A foot-loading signature is the input; the injury often shows up up the chain</text>
<rect x="24" y="74" width="250" height="372" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.6"/>
<text x="40" y="100" font-size="12" fill="#0f172a" font-weight="700" text-anchor="start">Where it shows up</text>
<rect x="98" y="120" width="44" height="86" rx="14" fill="#cbd5e1"/>
<circle cx="120" cy="212" r="15" fill="#b6c2d4"/>
<rect x="104" y="224" width="32" height="82" rx="12" fill="#cbd5e1"/>
<circle cx="120" cy="312" r="12" fill="#b6c2d4"/>
<rect x="106" y="318" width="74" height="18" rx="8" fill="#cbd5e1"/>
<circle cx="142" cy="150" r="4.5" fill="#e11d48"/><line x1="146" y1="150" x2="176" y2="150" stroke="#e11d48" stroke-width="1.2"/><text x="180" y="153" font-size="8.5" fill="#0f172a" font-weight="700" text-anchor="start">hamstring</text>
<text x="180" y="163" font-size="7.5" fill="#64748b" font-weight="400" text-anchor="start">(sprint late-swing)</text>
<circle cx="120" cy="212" r="4.5" fill="#e11d48"/><line x1="124" y1="212" x2="176" y2="212" stroke="#e11d48" stroke-width="1.2"/><text x="180" y="215" font-size="8.5" fill="#0f172a" font-weight="700" text-anchor="start">ACL</text>
<text x="180" y="225" font-size="7.5" fill="#64748b" font-weight="400" text-anchor="start">(landing / cut)</text>
<circle cx="120" cy="262" r="4.5" fill="#2563eb"/><line x1="124" y1="262" x2="176" y2="262" stroke="#2563eb" stroke-width="1.2"/><text x="180" y="265" font-size="8.5" fill="#0f172a" font-weight="700" text-anchor="start">shin splints (MTSS)</text>
<circle cx="120" cy="312" r="4.5" fill="#2563eb"/><line x1="124" y1="312" x2="176" y2="312" stroke="#2563eb" stroke-width="1.2"/><text x="180" y="315" font-size="8.5" fill="#0f172a" font-weight="700" text-anchor="start">ankle sprain</text>
<circle cx="120" cy="330" r="4.5" fill="#f59e0b"/><line x1="124" y1="330" x2="176" y2="330" stroke="#f59e0b" stroke-width="1.2"/><text x="180" y="333" font-size="8.5" fill="#0f172a" font-weight="700" text-anchor="start">2nd-met stress fx · PF</text>
<text x="40" y="400" font-size="8.5" fill="#64748b" font-weight="400" text-anchor="start">Foot marker positions are anatomical</text>
<text x="40" y="415" font-size="8.5" fill="#64748b" font-weight="400" text-anchor="start">(mm on your foot, e.g. met2 ≈ 38×189).</text>
<rect x="290" y="74" width="586" height="372" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.6"/>
<text x="306" y="100" font-size="12.5" fill="#0f172a" font-weight="700" text-anchor="start">Foot-loading signature → chain injury</text>
<rect x="306" y="118" width="554" height="52" rx="8" fill="#fdecef" stroke="#e11d48" stroke-width="1.3"/>
<text x="320" y="138" font-size="10" fill="#0f172a" font-weight="700" text-anchor="start">High vGRF + loading rate (stiff landing)</text>
<text x="500" y="138" font-size="11" fill="#64748b">→</text>
<text x="320" y="157" font-size="9.5" fill="#e11d48" font-weight="700" text-anchor="start">ACL · tibial bone stress</text>
<text x="848" y="138" font-size="8.5" fill="#64748b" font-weight="400" text-anchor="end">jump / gym</text>
<rect x="306" y="178" width="554" height="52" rx="8" fill="#fdecef" stroke="#e11d48" stroke-width="1.3"/>
<text x="320" y="198" font-size="10" fill="#0f172a" font-weight="700" text-anchor="start">L/R asymmetry &gt; 10–15%</text>
<text x="500" y="198" font-size="11" fill="#64748b">→</text>
<text x="320" y="217" font-size="9.5" fill="#e11d48" font-weight="700" text-anchor="start">non-contact ACL · hamstring</text>
<text x="848" y="198" font-size="8.5" fill="#64748b" font-weight="400" text-anchor="end">soccer cut</text>
<rect x="306" y="238" width="554" height="52" rx="8" fill="#fff7ed" stroke="#f59e0b" stroke-width="1.3"/>
<text x="320" y="258" font-size="10" fill="#0f172a" font-weight="700" text-anchor="start">Over-stride: foot lands ahead in sprint</text>
<text x="500" y="258" font-size="11" fill="#64748b">→</text>
<text x="320" y="277" font-size="9.5" fill="#f59e0b" font-weight="700" text-anchor="start">HAMSTRING (late-swing eccentric)</text>
<text x="848" y="258" font-size="8.5" fill="#64748b" font-weight="400" text-anchor="end">soccer sprint</text>
<rect x="306" y="298" width="554" height="52" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.3"/>
<text x="320" y="318" font-size="10" fill="#0f172a" font-weight="700" text-anchor="start">Medial collapse / overpronation</text>
<text x="500" y="318" font-size="11" fill="#64748b">→</text>
<text x="320" y="337" font-size="9.5" fill="#2563eb" font-weight="700" text-anchor="start">shin splints (MTSS) · PF · knee valgus → ACL</text>
<text x="848" y="318" font-size="8.5" fill="#64748b" font-weight="400" text-anchor="end">runner</text>
<rect x="306" y="358" width="554" height="52" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.3"/>
<text x="320" y="378" font-size="10" fill="#0f172a" font-weight="700" text-anchor="start">Lateral overload / supination</text>
<text x="500" y="378" font-size="11" fill="#64748b">→</text>
<text x="320" y="397" font-size="9.5" fill="#2563eb" font-weight="700" text-anchor="start">ankle sprain · 5th-met (Jones) · IT band</text>
<text x="848" y="378" font-size="8.5" fill="#64748b" font-weight="400" text-anchor="end">cutter</text>
<text x="24" y="466" font-size="9.5" fill="#64748b" font-weight="400" text-anchor="start">Rubrics can flag proximal injuries from the foot signature — and video→force (cited pose→GRF) estimates the load even without a sensor. Not a medical device.</text>
</svg>
