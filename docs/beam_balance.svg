<svg viewBox="0 0 900 460" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
<title>Specialized beam/athlete balance: on a 10cm beam mediolateral sway is what makes you fall, so the module scores ML sway plus the landing 'stick' — a clean landing settles instantly (10.0), a wobbly one with a step scores 9.2. Also relevé forefoot load and an athlete Romberg where low eyes-closed sway is elite.</title>
<desc>Left: a beam with ML-sway arrows. Middle: clean vs wobbly landing COP scatter with stick scores. Right: what it scores.</desc>
<defs><marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#64748b"/></marker><marker id="arr" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#e11d48"/></marker></defs>
<rect x="4" y="4" width="892" height="452" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
<text x="24" y="36" font-size="18" fill="#0f172a" font-weight="700" text-anchor="start">Beam / athlete balance — the specialized case</text><text x="24" y="55" font-size="11.5" fill="#475569" font-weight="400" text-anchor="start">Elite balance isn't "are you safe?" but "how clean was that?" — ML control + the landing stick</text>
<rect x="24" y="74" width="268" height="320" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.6"/>
<text x="40" y="100" font-size="12" fill="#0f172a" font-weight="700" text-anchor="start">On the beam — ML is everything</text>
<rect x="52" y="210" width="208" height="14" rx="3" fill="#cbb28a" stroke="#94a3b8"/>
<text x="156" y="246" font-size="9" fill="#64748b" font-weight="400" text-anchor="middle">beam — 10 cm wide</text>
<ellipse cx="156" cy="205" rx="16" ry="30" fill="#dbe4ef" stroke="#94a3b8"/>
<circle cx="156" cy="205" r="4" fill="#0f172a"/>
<line x1="156" y1="150" x2="156" y2="180" stroke="#e11d48" stroke-width="2.4" marker-end="url(#arr)"/>
<line x1="156" y1="262" x2="156" y2="290" stroke="#e11d48" stroke-width="2.4" marker-end="url(#arr)"/>
<text x="168" y="140" font-size="9.5" fill="#e11d48" font-weight="700" text-anchor="start">ML sway = fall off</text>
<line x1="70" y1="330" x2="45" y2="330" stroke="#64748b" stroke-width="1.6" marker-end="url(#ar)"/>
<line x1="242" y1="330" x2="267" y2="330" stroke="#64748b" stroke-width="1.6" marker-end="url(#ar)"/>
<text x="156" y="333" font-size="9" fill="#64748b" font-weight="400" text-anchor="middle">AP = along the beam, fine</text>
<text x="40" y="372" font-size="9.5" fill="#475569" font-weight="400" text-anchor="start">So we score ML sway, not total.</text>
<rect x="304" y="74" width="268" height="320" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.6"/>
<text x="320" y="100" font-size="11.5" fill="#0f172a" font-weight="700" text-anchor="start">Landing "stick" — the signature score</text>
<rect x="320" y="116" width="236" height="120" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.4"/>
<line x1="438" y1="130" x2="438" y2="220" stroke="#e2e8f0"/><line x1="345" y1="176" x2="531" y2="176" stroke="#e2e8f0"/>
<circle cx="438" cy="176" r="2.4" fill="#16a34a"/>
<circle cx="444" cy="173" r="2.4" fill="#16a34a"/>
<circle cx="435" cy="182" r="2.4" fill="#16a34a"/>
<circle cx="441" cy="179" r="2.4" fill="#16a34a"/>
<circle cx="432" cy="173" r="2.4" fill="#16a34a"/>
<circle cx="438" cy="182" r="2.4" fill="#16a34a"/>
<text x="440" y="210" font-size="8" fill="#64748b" font-weight="400" text-anchor="middle">COP settles at once</text>
<text x="330" y="132" font-size="9.5" fill="#16a34a" font-weight="700" text-anchor="start">clean</text>
<text x="546" y="132" font-size="11" fill="#16a34a" font-weight="700" text-anchor="end">STUCK 10.0</text>
<rect x="320" y="246" width="236" height="120" rx="8" fill="#fff7ed" stroke="#f59e0b" stroke-width="1.4"/>
<line x1="438" y1="260" x2="438" y2="350" stroke="#e2e8f0"/><line x1="345" y1="306" x2="531" y2="306" stroke="#e2e8f0"/>
<circle cx="438" cy="306" r="2.4" fill="#f59e0b"/>
<circle cx="456" cy="297" r="2.4" fill="#f59e0b"/>
<circle cx="423" cy="318" r="2.4" fill="#f59e0b"/>
<circle cx="468" cy="312" r="2.4" fill="#f59e0b"/>
<circle cx="414" cy="297" r="2.4" fill="#f59e0b"/>
<circle cx="480" cy="324" r="2.4" fill="#f59e0b"/>
<circle cx="447" cy="285" r="2.4" fill="#f59e0b"/>
<circle cx="429" cy="330" r="2.4" fill="#f59e0b"/>
<circle cx="528" cy="312" r="2.4" fill="#e11d48"/>
<circle cx="537" cy="321" r="2.4" fill="#e11d48"/>
<circle cx="522" cy="300" r="2.4" fill="#e11d48"/>
<text x="330" y="262" font-size="9.5" fill="#f59e0b" font-weight="700" text-anchor="start">wobble</text>
<text x="546" y="262" font-size="11" fill="#e11d48" font-weight="700" text-anchor="end">9.2 · step</text>
<text x="500" y="330" font-size="8" fill="#e11d48" font-weight="700" text-anchor="end">step →</text>
<rect x="584" y="74" width="292" height="320" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.6"/>
<text x="600" y="100" font-size="12" fill="#0f172a" font-weight="700" text-anchor="start">What it scores</text>
<text x="600" y="126" font-size="9.5" fill="#0f172a" font-weight="700" text-anchor="start">Landing (judge-style deductions):</text>
<text x="610" y="146" font-size="9" fill="#475569" font-weight="400" text-anchor="start">• settle time (COP speed &lt; 25 mm/s)</text>
<text x="610" y="163" font-size="9" fill="#475569" font-weight="400" text-anchor="start">• wobbles (~0.1 each)</text>
<text x="610" y="180" font-size="9" fill="#475569" font-weight="400" text-anchor="start">• a step / hop (~0.5)</text>
<text x="610" y="197" font-size="9" fill="#475569" font-weight="400" text-anchor="start">• post-landing sway</text>
<text x="600" y="232" font-size="9.5" fill="#0f172a" font-weight="700" text-anchor="start">Static hold:</text>
<text x="610" y="250" font-size="9" fill="#475569" font-weight="400" text-anchor="start">• ML sway 0.42 mm → elite grade</text>
<text x="610" y="267" font-size="9" fill="#475569" font-weight="400" text-anchor="start">• 92% forefoot → relevé (on the ball)</text>
<text x="600" y="300" font-size="9.5" fill="#0f172a" font-weight="700" text-anchor="start">Vision independence (athlete Romberg):</text>
<text x="610" y="318" font-size="9" fill="#475569" font-weight="400" text-anchor="start">• low eyes-closed sway = elite (spotting)</text>
<text x="600" y="352" font-size="9" fill="#64748b" font-weight="400" text-anchor="start">Trend stick scores + ML sway across a season.</text>
<text x="24" y="424" font-size="9.5" fill="#64748b" font-weight="400" text-anchor="start">The niche: we own the foot-pressure + COP layer the camera can't see — sync each landing to your video by timestamp. Not a medical device.</text>
</svg>
