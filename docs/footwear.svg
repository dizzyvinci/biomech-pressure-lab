<svg viewBox="0 0 900 460" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
<title>Heel lifts attenuate heel peak pressure but raise forefoot pressure and PTI, so a lift alone trades heel pain for metatarsalgia — the design rule is heel offload PLUS forefoot cushion plus preserved arch (softer lift; hypermobile load not stretch). And peak vs pressure-time integral: running has the highest peak but lower PTI, standing the reverse; PTI is the better overuse predictor.</title>
<desc>Left: heel-lift trade-off with a side-view foot + wedge and the design rule. Right: peak-vs-PTI bars for running/walking/standing.</desc>
<defs><marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#64748b"/></marker><marker id="arr" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#e11d48"/></marker></defs>
<rect x="4" y="4" width="892" height="452" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
<text x="24" y="36" font-size="18" fill="#0f172a" font-weight="700" text-anchor="start">Heel lifts &amp; pressure-time integral — designing the fix</text><text x="24" y="55" font-size="11.5" fill="#475569" font-weight="400" text-anchor="start">Offloading a painful heel can overload the forefoot; and cumulative dose (PTI) matters, not just peak</text>
<rect x="24" y="74" width="400" height="360" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.6"/>
<text x="40" y="100" font-size="12" fill="#0f172a" font-weight="700" text-anchor="start">The heel-lift trade-off</text>
<rect x="70" y="180" width="200" height="22" rx="10" fill="#e6ebf2" stroke="#94a3b8"/>
<polygon points="70,202 150,202 70,226" fill="#f59e0b" stroke="#94a3b8"/>
<text x="78" y="244" font-size="8.5" fill="#7c2d12" font-weight="700" text-anchor="start">heel lift</text>
<line x1="105" y1="150" x2="105" y2="176" stroke="#2563eb" stroke-width="2.6" marker-end="url(#ar)"/>
<text x="50" y="146" font-size="9" fill="#2563eb" font-weight="700" text-anchor="start">heel pressure ↓</text>
<text x="50" y="158" font-size="7.5" fill="#64748b" font-weight="400" text-anchor="start">offloads the pain</text>
<line x1="235" y1="176" x2="235" y2="150" stroke="#e11d48" stroke-width="2.6" marker-end="url(#arr)"/>
<text x="284" y="165" font-size="9" fill="#e11d48" font-weight="700" text-anchor="start">forefoot pressure ↑</text>
<text x="284" y="177" font-size="7.5" fill="#64748b" font-weight="400" text-anchor="start">+ PTI · met overload</text>
<text x="40" y="278" font-size="9.5" fill="#0f172a" font-weight="700" text-anchor="start">A lift ALONE trades heel pain for metatarsalgia —</text>
<text x="40" y="292" font-size="9.5" fill="#475569" font-weight="400" text-anchor="start">worse if you already toe-walk / have equinus.</text>
<rect x="40" y="306" width="368" height="110" rx="8" fill="#ffffff" stroke="#16a34a" stroke-width="1.6"/>
<text x="54" y="328" font-size="11" fill="#16a34a" font-weight="700" text-anchor="start">✓ The design rule</text>
<text x="54" y="348" font-size="9.5" fill="#475569" font-weight="400" text-anchor="start">Do BOTH: heel offload/cushion + forefoot cushion</text>
<text x="54" y="363" font-size="9.5" fill="#475569" font-weight="400" text-anchor="start">(met pad) + preserved arch — not a lift alone.</text>
<text x="54" y="383" font-size="9.5" fill="#475569" font-weight="400" text-anchor="start">Softer lift (PORON ~15 Shore) beats a hard flat one.</text>
<text x="54" y="401" font-size="9.5" fill="#0f172a" font-weight="700" text-anchor="start">Hypermobile → LOAD the calf/plantar, don't just stretch.</text>
<rect x="440" y="74" width="436" height="360" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.6"/>
<text x="456" y="100" font-size="12" fill="#0f172a" font-weight="700" text-anchor="start">Peak vs pressure-time integral (PTI)</text>
<text x="456" y="122" font-size="9" fill="#64748b" font-weight="400" text-anchor="start">Peak = highest pressure · PTI = cumulative dose over time</text>
<text x="456" y="148" font-size="10" fill="#0f172a" font-weight="700" text-anchor="start">Running (brief, hard)</text><text x="466" y="168" font-size="8.5" fill="#e11d48" font-weight="400" text-anchor="start">peak</text><rect x="520" y="158" width="300" height="13" rx="4" fill="#eef2f7" stroke="#e2e8f0" stroke-width="1"/><rect x="520" y="158" width="285" height="13" rx="4" fill="#e11d48"/><text x="466" y="190" font-size="8.5" fill="#2563eb" font-weight="400" text-anchor="start">PTI</text><rect x="520" y="180" width="300" height="13" rx="4" fill="#eef2f7" stroke="#e2e8f0" stroke-width="1"/><rect x="520" y="180" width="120" height="13" rx="4" fill="#2563eb"/>
<text x="456" y="214" font-size="10" fill="#0f172a" font-weight="700" text-anchor="start">Walking</text><text x="466" y="234" font-size="8.5" fill="#e11d48" font-weight="400" text-anchor="start">peak</text><rect x="520" y="224" width="300" height="13" rx="4" fill="#eef2f7" stroke="#e2e8f0" stroke-width="1"/><rect x="520" y="224" width="180" height="13" rx="4" fill="#e11d48"/><text x="466" y="256" font-size="8.5" fill="#2563eb" font-weight="400" text-anchor="start">PTI</text><rect x="520" y="246" width="300" height="13" rx="4" fill="#eef2f7" stroke="#e2e8f0" stroke-width="1"/><rect x="520" y="246" width="195" height="13" rx="4" fill="#2563eb"/>
<text x="456" y="280" font-size="10" fill="#0f172a" font-weight="700" text-anchor="start">Standing (long, soft)</text><text x="466" y="300" font-size="8.5" fill="#e11d48" font-weight="400" text-anchor="start">peak</text><rect x="520" y="290" width="300" height="13" rx="4" fill="#eef2f7" stroke="#e2e8f0" stroke-width="1"/><rect x="520" y="290" width="60" height="13" rx="4" fill="#e11d48"/><text x="466" y="322" font-size="8.5" fill="#2563eb" font-weight="400" text-anchor="start">PTI</text><rect x="520" y="312" width="300" height="13" rx="4" fill="#eef2f7" stroke="#e2e8f0" stroke-width="1"/><rect x="520" y="312" width="270" height="13" rx="4" fill="#2563eb"/>
<text x="456" y="344" font-size="9" fill="#475569" font-weight="400" text-anchor="start">Running has the HIGHEST peak but a LOWER PTI (short</text>
<text x="456" y="358" font-size="9" fill="#475569" font-weight="400" text-anchor="start">contact); standing is the reverse. A brief hard hit and a</text>
<text x="456" y="372" font-size="9" fill="#475569" font-weight="400" text-anchor="start">long sustained load injure differently — track both.</text>
<text x="456" y="396" font-size="9" fill="#0f172a" font-weight="700" text-anchor="start">PTI is the better overuse/tissue predictor (met2 ~38.4 kPa·s).</text>
<text x="456" y="410" font-size="8.5" fill="#64748b" font-weight="400" text-anchor="start">interpret.py's per-zone impulse IS the calibrated PTI.</text>
<text x="24" y="448" font-size="9" fill="#64748b" font-weight="400" text-anchor="start">Sources: heel lifts PubMed 24440428 · PTI PMC11336220 · cutting J Biomech 2014 (refs/plantar_norms.json). Not medical advice.</text>
</svg>
