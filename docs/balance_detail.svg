<svg viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
<title>Balance module detail: a standing figure with center-of-pressure sway, an eyes-open vs eyes-closed sway-ellipse comparison (211 vs 770 mm2), the Romberg quotient (3.6, vision-reliant), and the resulting device directives.</title>
<desc>Three panels: standing figure with COP trace, sway-ellipse comparison, and a metrics/Romberg/directives panel.</desc>
<defs><marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#64748b"/></marker><marker id="arr" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#e11d48"/></marker></defs>
<rect x="4" y="4" width="892" height="472" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
<text x="24" y="36" font-size="18" fill="#0f172a" font-weight="700" text-anchor="start">Balance module — a wearable posturography lab</text><text x="24" y="55" font-size="11.5" fill="#475569" font-weight="400" text-anchor="start">For balance issues, not just foot pain: the same rig screens stability &amp; fall risk</text>
<rect x="30" y="78" width="250" height="372" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.6"/>
<text x="46" y="104" font-size="12.5" fill="#0f172a" font-weight="700" text-anchor="start">Quiet standing</text>
<circle cx="155" cy="150" r="16" fill="#cbd5e1"/>
<rect x="140" y="168" width="30" height="70" rx="10" fill="#cbd5e1"/>
<rect x="146" y="238" width="10" height="60" fill="#cbd5e1"/>
<rect x="158" y="238" width="10" height="60" fill="#cbd5e1"/>
<ellipse cx="140" cy="318" rx="17" ry="20" fill="#dbe4ef" stroke="#94a3b8" stroke-width="1.3"/><ellipse cx="140" cy="349" rx="12" ry="16" fill="#dbe4ef" stroke="#94a3b8" stroke-width="1.3"/><rect x="128" y="321" width="24" height="20" fill="#dbe4ef"/>
<ellipse cx="178" cy="318" rx="17" ry="20" fill="#dbe4ef" stroke="#94a3b8" stroke-width="1.3"/><ellipse cx="178" cy="349" rx="12" ry="16" fill="#dbe4ef" stroke="#94a3b8" stroke-width="1.3"/><rect x="166" y="321" width="24" height="20" fill="#dbe4ef"/>
<path d="M150 335 q8 -6 14 2 q-10 8 -4 14 q12 -2 6 10" fill="none" stroke="#e11d48" stroke-width="1.6"/>
<text x="46" y="380" font-size="9.5" fill="#475569" font-weight="400" text-anchor="start">IMU adds trunk sway;</text>
<text x="46" y="395" font-size="9.5" fill="#475569" font-weight="400" text-anchor="start">FSR center-of-pressure</text>
<text x="46" y="410" font-size="9.5" fill="#475569" font-weight="400" text-anchor="start">traces the body's sway.</text>
<text x="46" y="434" font-size="9.5" fill="#64748b" font-weight="400" text-anchor="start">30 s per condition.</text>
<rect x="300" y="78" width="300" height="372" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.6"/>
<text x="316" y="104" font-size="12" fill="#0f172a" font-weight="700" text-anchor="start">Sway area — eyes open vs closed</text>
<line x1="450" y1="140" x2="450" y2="380" stroke="#e2e8f0"/>
<line x1="330" y1="250" x2="570" y2="250" stroke="#e2e8f0"/>
<ellipse cx="450" cy="250" rx="96" ry="70" fill="#fdecef" stroke="#e11d48" stroke-width="2" stroke-dasharray="5 4"/>
<ellipse cx="450" cy="250" rx="46" ry="34" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
<text x="450" y="253" font-size="8.5" fill="#0f172a" font-weight="400" text-anchor="middle">COP</text>
<text x="550" y="190" font-size="9.5" fill="#e11d48" font-weight="700" text-anchor="end">eyes-closed</text>
<text x="550" y="204" font-size="9" fill="#e11d48" font-weight="400" text-anchor="end">770 mm²</text>
<text x="500" y="300" font-size="9.5" fill="#16a34a" font-weight="700" text-anchor="start">eyes-open</text>
<text x="500" y="314" font-size="9" fill="#16a34a" font-weight="400" text-anchor="start">211 mm²</text>
<text x="336" y="400" font-size="9" fill="#64748b" font-weight="400" text-anchor="start">ML →</text>
<text x="456" y="152" font-size="9" fill="#64748b" font-weight="400" text-anchor="start">AP</text>
<rect x="620" y="78" width="250" height="372" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.6"/>
<text x="636" y="104" font-size="12.5" fill="#0f172a" font-weight="700" text-anchor="start">What it reports</text>
<text x="636" y="130" font-size="9.5" fill="#475569" font-weight="400" text-anchor="start">• 95% sway-ellipse area (mm²)</text>
<text x="636" y="148" font-size="9.5" fill="#475569" font-weight="400" text-anchor="start">• path length + mean velocity</text>
<text x="636" y="166" font-size="9.5" fill="#475569" font-weight="400" text-anchor="start">• ML vs AP dominance</text>
<text x="636" y="184" font-size="9.5" fill="#475569" font-weight="400" text-anchor="start">• trunk-sway RMS (IMU)</text>
<text x="636" y="202" font-size="9.5" fill="#475569" font-weight="400" text-anchor="start">• fall-risk flags</text>
<rect x="636" y="228" width="218" height="60" rx="8" fill="#ffffff" stroke="#e11d48" stroke-width="1.8"/>
<text x="745" y="250" font-size="13" fill="#0f172a" font-weight="700" text-anchor="middle">Romberg = 3.6</text>
<text x="745" y="268" font-size="8.5" fill="#64748b" font-weight="400" text-anchor="middle">eyes-closed ÷ eyes-open area</text>
<text x="745" y="281" font-size="8.5" fill="#e11d48" font-weight="700" text-anchor="middle">&gt;2 → strong reliance on vision</text>
<text x="636" y="316" font-size="10.5" fill="#0f172a" font-weight="700" text-anchor="start">→ device class:</text>
<text x="636" y="336" font-size="9.5" fill="#475569" font-weight="400" text-anchor="start">• lateral-support insole / wider base</text>
<text x="636" y="353" font-size="9.5" fill="#475569" font-weight="400" text-anchor="start">• balance-training cues</text>
<text x="636" y="370" font-size="9.5" fill="#475569" font-weight="400" text-anchor="start">• monitor trend over weeks</text>
<text x="636" y="410" font-size="9" fill="#64748b" font-weight="400" text-anchor="start">A screening / training aid,</text>
<text x="636" y="424" font-size="9" fill="#64748b" font-weight="400" text-anchor="start">not a diagnosis.</text>
<text x="24" y="466" font-size="10.5" fill="#64748b" font-weight="400" text-anchor="start">Same ~$100 rig, second capability: what a clinical posturography plate measures — sway area, velocity, Romberg — worn, all day.</text>
</svg>
