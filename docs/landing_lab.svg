<svg viewBox="0 0 900 470" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
<title>Landing lab: three disciplines scored from the same insole. Gymnastics 'stick' (forefoot to heel then freeze, 9.8), figure skating edge check-out (ball, outside edge, glide forward, 9.7), dance soft roll (toe-ball-heel, 9.9). Each has its own reward/deduct rubric.</title>
<desc>Three discipline columns with a footprint showing the landing pattern, a score badge, and the rubric.</desc>
<defs><marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#64748b"/></marker><marker id="arr" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#e11d48"/></marker></defs>
<rect x="4" y="4" width="892" height="462" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
<text x="24" y="36" font-size="18" fill="#0f172a" font-weight="700" text-anchor="start">Landing lab — one sensor, three rubrics</text><text x="24" y="55" font-size="11.5" fill="#475569" font-weight="400" text-anchor="start">All land forefoot-first; the discipline decides what 'good' means</text>
<rect x="24" y="74" width="276" height="356" rx="12" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.6"/>
<text x="42" y="100" font-size="13" fill="#0f172a" font-weight="700" text-anchor="start">Gymnastics</text>
<text x="42" y="117" font-size="10" fill="#16a34a" font-weight="700" text-anchor="start">the "stick"</text>
<circle cx="256" cy="106" r="22" fill="#16a34a"/>
<text x="256" y="104" font-size="12.5" fill="#ffffff" font-weight="700" text-anchor="middle">9.8</text><text x="256" y="118" font-size="6.5" fill="#ffffff" font-weight="700" text-anchor="middle">STUCK</text>
<ellipse cx="144" cy="186" rx="29" ry="41" fill="#ffffff" stroke="#94a3b8" stroke-width="1.3"/><ellipse cx="144" cy="248" rx="21" ry="31" fill="#ffffff" stroke="#94a3b8" stroke-width="1.3"/><rect x="123" y="192" width="42" height="41" fill="#ffffff"/>
<circle cx="144" cy="181" r="9" fill="#f59e0b" opacity="0.8"/>
<circle cx="135" cy="260" r="9" fill="#e11d48" opacity="0.8"/>
<line x1="144" y1="190" x2="135" y2="251" stroke="#0f172a" stroke-width="1.6" marker-end="url(#ar)"/>
<text x="149.3" y="263.4" font-size="8.5" fill="#0f172a" font-weight="700" text-anchor="start">■ freeze</text>
<rect x="42" y="300" width="240" height="30" rx="8" fill="#ffffff" stroke="#16a34a" stroke-width="1.4"/>
<text x="54" y="320" font-size="9.5" fill="#0f172a" font-weight="700" text-anchor="start">forefoot → heel → FREEZE</text>
<text x="42" y="352" font-size="9" fill="#475569" font-weight="400" text-anchor="start">reward: settle to stillness</text>
<text x="42" y="369" font-size="9" fill="#64748b" font-weight="400" text-anchor="start">deduct: hop · step · wobble</text>
<rect x="312" y="74" width="276" height="356" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="1.6"/>
<text x="330" y="100" font-size="13" fill="#0f172a" font-weight="700" text-anchor="start">Figure skating</text>
<text x="330" y="117" font-size="10" fill="#2563eb" font-weight="700" text-anchor="start">edge check-out</text>
<circle cx="544" cy="106" r="22" fill="#2563eb"/>
<text x="544" y="104" font-size="12.5" fill="#ffffff" font-weight="700" text-anchor="middle">9.7</text><text x="544" y="118" font-size="6.5" fill="#ffffff" font-weight="700" text-anchor="middle">EDGE</text>
<ellipse cx="432" cy="186" rx="29" ry="41" fill="#ffffff" stroke="#94a3b8" stroke-width="1.3"/><ellipse cx="432" cy="248" rx="21" ry="31" fill="#ffffff" stroke="#94a3b8" stroke-width="1.3"/><rect x="411" y="192" width="42" height="41" fill="#ffffff"/>
<circle cx="432" cy="181" r="9" fill="#2563eb" opacity="0.8"/>
<circle cx="444" cy="184" r="7" fill="#2563eb" opacity="0.55"/>
<text x="453.6" y="186.6" font-size="8" fill="#2563eb" font-weight="700" text-anchor="start">outside edge</text>
<line x1="432" y1="156" x2="432" y2="134" stroke="#2563eb" stroke-width="2.2" marker-end="url(#ar)"/>
<text x="440" y="142" font-size="8.5" fill="#2563eb" font-weight="700" text-anchor="start">glide</text>
<rect x="330" y="300" width="240" height="30" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.4"/>
<text x="342" y="320" font-size="9.5" fill="#0f172a" font-weight="700" text-anchor="start">ball · outside edge → GLIDE</text>
<text x="330" y="352" font-size="9" fill="#475569" font-weight="400" text-anchor="start">reward: 1-foot · edge · flow</text>
<text x="330" y="369" font-size="9" fill="#64748b" font-weight="400" text-anchor="start">deduct: step-out · stumble · slam</text>
<rect x="600" y="74" width="276" height="356" rx="12" fill="#fdecef" stroke="#e11d48" stroke-width="1.6"/>
<text x="618" y="100" font-size="13" fill="#0f172a" font-weight="700" text-anchor="start">Dance / ballet</text>
<text x="618" y="117" font-size="10" fill="#e11d48" font-weight="700" text-anchor="start">soft roll</text>
<circle cx="832" cy="106" r="22" fill="#e11d48"/>
<text x="832" y="104" font-size="12.5" fill="#ffffff" font-weight="700" text-anchor="middle">9.9</text><text x="832" y="118" font-size="6.5" fill="#ffffff" font-weight="700" text-anchor="middle">SOFT</text>
<ellipse cx="720" cy="186" rx="29" ry="41" fill="#ffffff" stroke="#94a3b8" stroke-width="1.3"/><ellipse cx="720" cy="248" rx="21" ry="31" fill="#ffffff" stroke="#94a3b8" stroke-width="1.3"/><rect x="699" y="192" width="42" height="41" fill="#ffffff"/>
<path d="M720 175 q26 40 -9 91" fill="none" stroke="#e11d48" stroke-width="2.2" marker-end="url(#arr)"/>
<text x="730.0" y="173.2" font-size="8" fill="#64748b" font-weight="400" text-anchor="start">toe</text><text x="707.3" y="274.4" font-size="8" fill="#64748b" font-weight="400" text-anchor="start">heel</text>
<rect x="618" y="300" width="240" height="30" rx="8" fill="#ffffff" stroke="#e11d48" stroke-width="1.4"/>
<text x="630" y="320" font-size="9.5" fill="#0f172a" font-weight="700" text-anchor="start">toe → ball → heel · quiet</text>
<text x="618" y="352" font-size="9" fill="#475569" font-weight="400" text-anchor="start">reward: soft impact · full roll</text>
<text x="618" y="369" font-size="9" fill="#64748b" font-weight="400" text-anchor="start">deduct: heavy/loud · flat slap</text>
<text x="24" y="404" font-size="10" fill="#475569" font-weight="400" text-anchor="start">Gymnastics rewards stopping · skating rewards a gliding edge · dance rewards a soft roll — same center-of-pressure data, three rubrics.</text>
<text x="24" y="452" font-size="9.5" fill="#64748b" font-weight="400" text-anchor="start">Sync each rep to your video by timestamp; the sensor adds the pressure layer the camera can't see. Not a medical device.</text>
</svg>
