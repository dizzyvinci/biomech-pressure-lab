<svg viewBox="0 0 900 470" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
<title>A day of use: strap on in the morning, wear and log shoe and barefoot for 8-14 hours, run a 30-second balance test, pull the microSD at night to analyze, and recharge overnight. Plus per-piece lifespans.</title>
<desc>A 24-hour timeline with a wear span and markers, a battery drain bar, and six lifespan chips.</desc>
<defs><marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#64748b"/></marker><marker id="arr" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#e11d48"/></marker></defs>
<rect x="4" y="4" width="892" height="462" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
<text x="24" y="36" font-size="18" fill="#0f172a" font-weight="700" text-anchor="start">A day of use — lifespans &amp; battery</text><text x="24" y="55" font-size="11.5" fill="#475569" font-weight="400" text-anchor="start">Strap on in the morning, log through the day, offload + recharge at night</text>
<line x1="60" y1="150" x2="840" y2="150" stroke="#94a3b8" stroke-width="2"/>
<line x1="60" y1="145" x2="60" y2="155" stroke="#94a3b8" stroke-width="2"/>
<text x="60" y="170" font-size="9" fill="#64748b" font-weight="400" text-anchor="middle">7a</text>
<line x1="190" y1="145" x2="190" y2="155" stroke="#94a3b8" stroke-width="2"/>
<text x="190.0" y="170" font-size="9" fill="#64748b" font-weight="400" text-anchor="middle">9a</text>
<line x1="320" y1="145" x2="320" y2="155" stroke="#94a3b8" stroke-width="2"/>
<text x="320.0" y="170" font-size="9" fill="#64748b" font-weight="400" text-anchor="middle">12p</text>
<line x1="450" y1="145" x2="450" y2="155" stroke="#94a3b8" stroke-width="2"/>
<text x="450.0" y="170" font-size="9" fill="#64748b" font-weight="400" text-anchor="middle">3p</text>
<line x1="580" y1="145" x2="580" y2="155" stroke="#94a3b8" stroke-width="2"/>
<text x="580.0" y="170" font-size="9" fill="#64748b" font-weight="400" text-anchor="middle">6p</text>
<line x1="710" y1="145" x2="710" y2="155" stroke="#94a3b8" stroke-width="2"/>
<text x="710.0" y="170" font-size="9" fill="#64748b" font-weight="400" text-anchor="middle">9p</text>
<line x1="840" y1="145" x2="840" y2="155" stroke="#94a3b8" stroke-width="2"/>
<text x="840" y="170" font-size="9" fill="#64748b" font-weight="400" text-anchor="middle">7a</text>
<rect x="60" y="116" width="650" height="20" rx="6" fill="#eff6ff" stroke="#2563eb"/>
<text x="385.0" y="130" font-size="9.5" fill="#2563eb" font-weight="700" text-anchor="middle">wear + log  (shoe &amp; barefoot)  ~8–14 h</text>
<circle cx="60" cy="150" r="5" fill="#e11d48"/><text x="60" y="192" font-size="9.5" fill="#0f172a" font-weight="700" text-anchor="middle">strap on</text><text x="60" y="206" font-size="8.5" fill="#64748b" font-weight="400" text-anchor="middle">pod at ankle</text>
<circle cx="385" cy="150" r="5" fill="#16a34a"/><text x="385.0" y="192" font-size="9.5" fill="#0f172a" font-weight="700" text-anchor="middle">30 s balance</text><text x="385.0" y="206" font-size="8.5" fill="#64748b" font-weight="400" text-anchor="middle">eyes open/closed</text>
<circle cx="710" cy="150" r="5" fill="#e11d48"/><text x="710.0" y="192" font-size="9.5" fill="#0f172a" font-weight="700" text-anchor="middle">pull microSD</text><text x="710.0" y="206" font-size="8.5" fill="#64748b" font-weight="400" text-anchor="middle">→ analyze</text>
<circle cx="840" cy="150" r="5" fill="#f59e0b"/><text x="840" y="192" font-size="9.5" fill="#0f172a" font-weight="700" text-anchor="middle">recharge</text><text x="840" y="206" font-size="8.5" fill="#64748b" font-weight="400" text-anchor="middle">overnight</text>
<text x="60" y="235" font-size="11" fill="#0f172a" font-weight="700" text-anchor="start">Battery (1000–1500 mAh)</text>
<rect x="60" y="245" width="640" height="26" rx="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1.4"/>
<rect x="62" y="247" width="397" height="22" rx="5" fill="#16a34a"/>
<rect x="459" y="247" width="128" height="22" rx="0" fill="#f59e0b"/>
<rect x="587" y="247" width="115" height="22" fill="#fee2e2"/>
<text x="80" y="262" font-size="9" fill="#ffffff" font-weight="700" text-anchor="start">100% morning</text>
<text x="560" y="262" font-size="9" fill="#7c2d12" font-weight="700" text-anchor="start">~20% by 9p</text>
<text x="715" y="262" font-size="9" fill="#7c2d12" font-weight="700" text-anchor="start">then recharge</text>
<rect x="60" y="300" width="250" height="46" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.2"/>
<rect x="60" y="300" width="5" height="46" rx="2" fill="#16a34a"/>
<text x="74" y="319" font-size="10" fill="#0f172a" font-weight="700" text-anchor="start">Battery</text>
<text x="74" y="335" font-size="9" fill="#475569" font-weight="400" text-anchor="start">~8–14 h / charge → a waking day</text>
<rect x="330" y="300" width="250" height="46" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.2"/>
<rect x="330" y="300" width="5" height="46" rx="2" fill="#2563eb"/>
<text x="344" y="319" font-size="10" fill="#0f172a" font-weight="700" text-anchor="start">microSD</text>
<text x="344" y="335" font-size="9" fill="#475569" font-weight="400" text-anchor="start">offload nightly · ~unlimited</text>
<rect x="600" y="300" width="250" height="46" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.2"/>
<rect x="600" y="300" width="5" height="46" rx="2" fill="#f59e0b"/>
<text x="614" y="319" font-size="10" fill="#0f172a" font-weight="700" text-anchor="start">Barefoot sole</text>
<text x="614" y="335" font-size="9" fill="#475569" font-weight="400" text-anchor="start">weeks–months · cheap to reprint</text>
<rect x="60" y="360" width="250" height="46" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.2"/>
<rect x="60" y="360" width="5" height="46" rx="2" fill="#64748b"/>
<text x="74" y="379" font-size="10" fill="#0f172a" font-weight="700" text-anchor="start">Ankle pod (PLA/PETG)</text>
<text x="74" y="395" font-size="9" fill="#475569" font-weight="400" text-anchor="start">indefinite</text>
<rect x="330" y="360" width="250" height="46" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.2"/>
<rect x="330" y="360" width="5" height="46" rx="2" fill="#e11d48"/>
<text x="344" y="379" font-size="10" fill="#0f172a" font-weight="700" text-anchor="start">FSRs</text>
<text x="344" y="395" font-size="9" fill="#475569" font-weight="400" text-anchor="start">recalibrate / swap over months</text>
<rect x="600" y="360" width="250" height="46" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.2"/>
<rect x="600" y="360" width="5" height="46" rx="2" fill="#0f172a"/>
<text x="614" y="379" font-size="10" fill="#0f172a" font-weight="700" text-anchor="start">Final insole (TPU)</text>
<text x="614" y="395" font-size="9" fill="#475569" font-weight="400" text-anchor="start">months · reprint to re-tune</text>
<text x="24" y="440" font-size="10.5" fill="#64748b" font-weight="400" text-anchor="start">The rig doesn't need literal 24/7 wear — a waking day per charge is plenty to trend load &amp; sway; recharge while you sleep.</text>
</svg>
