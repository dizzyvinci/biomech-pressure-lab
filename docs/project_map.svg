<text x="238.0" y="194" font-size="8.6" fill="#475569" font-weight="400" text-anchor="middle">ADC → real kPa</text>
<text x="238.0" y="212" font-size="7.6" fill="#64748b" font-weight="400" text-anchor="middle">calibrate.py</text>
