<svg viewBox="0 0 900 430" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
<title>The whole system as one loop: hardware in (insole rig or DIY lab; or no hardware via video-force / the demo) feeds a 6-stage pipeline — 1 capture (firmware), 2 calibrate (ADC to kPa), 3 analyze (hot spot and balance), 4 dose (CPTS to nerve/fascia), 5 design (relief, met pad, arch), 6 print (H2D TPU) — then a loop back: wear, re-measure, and track the dose falling with trend.py. The toolbox by job: pressure and insole (interpret, analyze_pressure, build_insole); balance and sway (balance, balance_positions, beam_balance); dose to tissue (bounce, day_summary, nerve_fascia, trend); sport and chain (landing_lab, zone_load, video_force).</title>
<desc>A left-to-right 6-stage pipeline with a feedback loop back to the start, hardware inputs feeding the first stage, and a four-group toolbox index along the bottom.</desc>
<defs><marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#64748b"/></marker><marker id="arr" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#e11d48"/></marker></defs>
<rect x="4" y="4" width="892" height="422" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
<text x="24" y="36" font-size="18" fill="#0f172a" font-weight="700" text-anchor="start">The whole system — one loop, end to end</text><text x="24" y="55" font-size="11.5" fill="#475569" font-weight="400" text-anchor="start">Capture your load → find the dose → design the fix → print it → watch it fall</text>
<rect x="30" y="72" width="560" height="40" rx="8" fill="#eef2f7" stroke="#e2e8f0" stroke-width="1.4"/>
<text x="44" y="89" font-size="9.5" fill="#0f172a" font-weight="700" text-anchor="start">Hardware in:</text>
<text x="122" y="89" font-size="9" fill="#475569" font-weight="400" text-anchor="start">insole rig (ankle pod + 8× FSR) · DIY lab (force plate · Velostat mat)</text>
<text x="44" y="104" font-size="9.5" fill="#64748b" font-weight="700" text-anchor="start">No hardware:</text>
<text x="126" y="104" font-size="9" fill="#64748b" font-weight="400" text-anchor="start">video→force estimate · or --demo on the committed sample</text>
<rect x="30" y="150" width="128" height="84" rx="9" fill="#eff6ff" stroke="#2563eb" stroke-width="1.8"/>
<text x="94.0" y="172" font-size="10.5" fill="#0f172a" font-weight="700" text-anchor="middle">1 · CAPTURE</text>
<text x="94.0" y="194" font-size="8.6" fill="#475569" font-weight="400" text-anchor="middle">log FSR + IMU</text>
<text x="94.0" y="212" font-size="7.6" fill="#64748b" font-weight="400" text-anchor="middle">all_day_logger</text>
<rect x="174" y="150" width="128" height="84" rx="9" fill="#eef2f7" stroke="#94a3b8" stroke-width="1.8"/>
