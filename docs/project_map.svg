<text x="814.0" y="194" font-size="8.6" fill="#475569" font-weight="400" text-anchor="middle">H2D · TPU</text>
<text x="814.0" y="212" font-size="7.6" fill="#64748b" font-weight="400" text-anchor="middle">your printer</text>
<line x1="736" y1="192.0" x2="747" y2="192.0" stroke="#64748b" stroke-width="1.8" marker-end="url(#ar)"/>
<line x1="94.0" y1="112" x2="94.0" y2="147" stroke="#64748b" stroke-width="1.6" marker-end="url(#ar)"/>
<path d="M814.0 234 L814.0 274 L94.0 274 L94.0 237" fill="none" stroke="#16a34a" stroke-width="2" marker-end="url(#ar)"/>
<rect x="279.0" y="259" width="350" height="30" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.4"/>
<text x="454.0" y="278" font-size="9.5" fill="#166534" font-weight="700" text-anchor="middle">wear → re-measure → TRACK the dose falling  (trend.py)</text>
<text x="30" y="328" font-size="10" fill="#0f172a" font-weight="700" text-anchor="start">The toolbox, by job:</text>
