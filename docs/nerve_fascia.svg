<text x="630" y="100" font-size="12" fill="#0f172a" font-weight="700" text-anchor="start">Same spot — which structure?</text>
<rect x="630" y="116" width="230" height="78" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.3"/>
<text x="642" y="136" font-size="9.5" fill="#0f172a" font-weight="700" text-anchor="start">Medial heel pain: read the clock</text>
<circle cx="648" cy="153" r="4" fill="#f59e0b"/>
<text x="658" y="156" font-size="8.5" fill="#475569" font-weight="400" text-anchor="start">MORNING first-steps → fascia</text>
<circle cx="648" cy="173" r="4" fill="#e11d48"/>
<text x="658" y="176" font-size="8.5" fill="#475569" font-weight="400" text-anchor="start">worse THROUGH THE DAY → Baxter</text>
<text x="630" y="214" font-size="9" fill="#475569" font-weight="400" text-anchor="start">Forefoot burning / numb toes,</text>
<text x="630" y="227" font-size="9" fill="#475569" font-weight="400" text-anchor="start">'pebble', Mulder's click → Morton.</text>
<text x="630" y="245" font-size="9" fill="#475569" font-weight="400" text-anchor="start">Medial-ANKLE Tinel, radiating</text>
<text x="630" y="258" font-size="9" fill="#475569" font-weight="400" text-anchor="start">sole → tarsal tunnel (tibial).</text>
<rect x="630" y="276" width="230" height="92" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.4"/>
<text x="642" y="296" font-size="9.5" fill="#16a34a" font-weight="700" text-anchor="start">Manage the dose, don't suppress:</text>
<text x="642" y="313" font-size="8.5" fill="#475569" font-weight="400" text-anchor="start">• met pad PROXIMAL to the heads</text>
<text x="642" y="327" font-size="8.5" fill="#475569" font-weight="400" text-anchor="start">• wider toe box · ball-of-foot rests</text>
<text x="642" y="341" font-size="8.5" fill="#475569" font-weight="400" text-anchor="start">• offload heel AND cushion forefoot</text>
<text x="642" y="355" font-size="8.5" fill="#475569" font-weight="400" text-anchor="start">• calf length work (equinus = 23× PF)</text>
<text x="630" y="392" font-size="8.5" fill="#64748b" font-weight="400" text-anchor="start">Steep forefoot gradient → subsurface</text>
<text x="630" y="404" font-size="8.5" fill="#64748b" font-weight="400" text-anchor="start">shear near the digital nerves.</text>
<text x="630" y="428" font-size="8.5" fill="#0f172a" font-weight="700" text-anchor="start">analysis/nerve_fascia.py --demo</text>
<text x="630" y="440" font-size="8" fill="#64748b" font-weight="400" text-anchor="start">refs: structures{} + CPTS metric</text>
<text x="24" y="506" font-size="8.5" fill="#64748b" font-weight="400" text-anchor="start">CPTS anchor 140–275 MPa·s/day is a diabetic-ULCER figure (at-risk tissue), not a healthy limit — compare zones &amp; track your own trend. Associations published; weights estimated. SCREENING, not diagnosis.</text>
