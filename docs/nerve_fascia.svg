<svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
<title>From foot pressure to nerve and fascia impact. A foot map marks plantar fascia (heel-to-forefoot tension band), Baxter's nerve (medial heel), Morton's/interdigital nerve (met2-4 interspaces), and posterior tibial nerve (tarsal tunnel, medial arch). On the sample day the all-day dose CPTS = PTI x cycles/day is forefoot ~12,800 vs heel/mid ~4,340 MPa.s/day, with 55% of forefoot cycles from the at-rest bounce dose (40,320/day vs 33,622 gait); structure loads plantar fascia 11,700, Morton 6,597, tibial 5,006, Baxter 2,395. Tell them apart: medial heel pain worse in the morning = fascia, worse through the day = Baxter's; forefoot burning/numb toes = Morton; medial-ankle Tinel = tarsal tunnel. Manage the dose (met pad, wider toe box, rest windows, calf work). Screening, not diagnosis.</title>
<desc>Left: foot map with four structures marked on their zones. Middle: CPTS dose bars (forefoot vs heel), the 85% bounce-dose callout, and structure-load ranking. Right: how to tell the structures apart by symptom/time-of-day and how to manage the dose.</desc>
<defs><marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#64748b"/></marker><marker id="arr" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#e11d48"/></marker></defs>
