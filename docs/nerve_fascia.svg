<text x="268" y="172" font-size="8.5" fill="#2563eb" font-weight="700" text-anchor="start">Morton /</text><text x="268" y="183" font-size="8.5" fill="#2563eb" font-weight="700" text-anchor="start">interdigital n.</text>
<circle cx="146" cy="387" r="6.5" fill="#e11d48" opacity="0.9" stroke="#fff" stroke-width="1.2"/>
<line x1="140" y1="387" x2="70" y2="404" stroke="#e11d48" stroke-width="1.2"/>
<text x="40" y="400" font-size="8.5" fill="#e11d48" font-weight="700" text-anchor="start">Baxter's n.</text><text x="40" y="411" font-size="7.5" fill="#64748b" font-weight="400" text-anchor="start">(medial heel)</text>
