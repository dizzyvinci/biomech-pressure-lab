<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
<title>Balance across positions: an mCTSIB 2x2 grid (firm/foam x eyes open/closed) with sway values, sensory-reliance ratios (vision x2.3, somatosensory x2.95, vestibular x7.9 = failure mode), single-leg L-vs-R asymmetry, and a limits-of-stability lean diagram.</title>
<desc>Left: mCTSIB 2x2 grid of sway. Right: sensory ratios, single-leg bars, and an LOS reach cross.</desc>
<defs><marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#64748b"/></marker><marker id="arr" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#e11d48"/></marker></defs>
<rect x="4" y="4" width="892" height="492" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
<text x="24" y="36" font-size="18" fill="#0f172a" font-weight="700" text-anchor="start">Balance across positions — mCTSIB &amp; beyond</text><text x="24" y="55" font-size="11.5" fill="#475569" font-weight="400" text-anchor="start">Label each stance; the module runs the standard sensory + stability protocols</text>
<rect x="24" y="74" width="430" height="330" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.6"/>
<text x="40" y="100" font-size="12.5" fill="#0f172a" font-weight="700" text-anchor="start">mCTSIB — which sense you rely on</text>
<text x="190" y="126" font-size="10" fill="#64748b" font-weight="700" text-anchor="middle">FIRM ground</text>
<text x="330" y="126" font-size="10" fill="#64748b" font-weight="700" text-anchor="middle">FOAM pad</text>
<text x="58" y="192" font-size="9" fill="#475569" font-weight="700" text-anchor="middle">eyes</text><text x="58" y="205" font-size="9" fill="#475569" font-weight="700" text-anchor="middle">OPEN</text>
<text x="58" y="300" font-size="9" fill="#475569" font-weight="700" text-anchor="middle">eyes</text><text x="58" y="313" font-size="9" fill="#475569" font-weight="700" text-anchor="middle">SHUT</text>
<rect x="130" y="145" width="120" height="92" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1.3"/>
<circle cx="190" cy="185" r="13" fill="#2563eb" opacity="0.22"/>
<text x="190.0" y="189" font-size="11.5" fill="#0f172a" font-weight="700" text-anchor="middle">208</text>
<text x="190.0" y="229" font-size="8" fill="#64748b" font-weight="400" text-anchor="middle">mm²</text>
<rect x="270" y="145" width="120" height="92" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1.3"/>
<circle cx="330" cy="185" r="22" fill="#2563eb" opacity="0.22"/>
<text x="330.0" y="189" font-size="11.5" fill="#0f172a" font-weight="700" text-anchor="middle">614</text>
<text x="330.0" y="229" font-size="8" fill="#64748b" font-weight="400" text-anchor="middle">mm²</text>
<rect x="130" y="255" width="120" height="92" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1.3"/>
<circle cx="190" cy="295" r="20" fill="#2563eb" opacity="0.22"/>
<text x="190.0" y="299" font-size="11.5" fill="#0f172a" font-weight="700" text-anchor="middle">471</text>
<text x="190.0" y="339" font-size="8" fill="#64748b" font-weight="400" text-anchor="middle">mm²</text>
<rect x="270" y="255" width="120" height="92" rx="8" fill="#fdecef" stroke="#e11d48" stroke-width="1.8"/>
<circle cx="330" cy="295" r="36" fill="#e11d48" opacity="0.35"/>
<text x="330.0" y="299" font-size="11.5" fill="#0f172a" font-weight="700" text-anchor="middle">1640</text>
<text x="330.0" y="339" font-size="8" fill="#64748b" font-weight="400" text-anchor="middle">mm²</text>
<text x="40" y="392" font-size="8.5" fill="#64748b" font-weight="400" text-anchor="start">↓ take away vision   → take away ground-feel   ◣ foam+shut = vestibular only</text>
<rect x="470" y="74" width="406" height="330" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.6"/>
<text x="486" y="100" font-size="12.5" fill="#0f172a" font-weight="700" text-anchor="start">Read-out (worked example)</text>
<text x="486" y="126" font-size="9.5" fill="#475569" font-weight="400" text-anchor="start">vision (shut/open, firm)</text>
<text x="712" y="126" font-size="11" fill="#0f172a" font-weight="700" text-anchor="end">×2.3</text>
<text x="724" y="126" font-size="8.5" fill="#64748b" font-weight="400" text-anchor="start">vision-reliant</text>
<text x="486" y="152" font-size="9.5" fill="#475569" font-weight="400" text-anchor="start">somatosensory (foam, open)</text>
<text x="712" y="152" font-size="11" fill="#0f172a" font-weight="700" text-anchor="end">×2.95</text>
<text x="724" y="152" font-size="8.5" fill="#64748b" font-weight="400" text-anchor="start">leans on foot feel</text>
<text x="486" y="178" font-size="9.5" fill="#475569" font-weight="400" text-anchor="start">vestibular (foam + shut)</text>
<text x="712" y="178" font-size="11" fill="#e11d48" font-weight="700" text-anchor="end">×7.9</text>
<text x="724" y="178" font-size="8.5" fill="#e11d48" font-weight="700" text-anchor="start">FAILURE MODE</text>
<text x="486" y="224" font-size="10.5" fill="#0f172a" font-weight="700" text-anchor="start">Single-leg  L vs R</text>
<rect x="486" y="232" width="230" height="15" rx="4" fill="#e11d48"/>
<text x="722.4878048780488" y="244" font-size="9" fill="#e11d48" font-weight="700" text-anchor="start">L 1260</text>
<rect x="486" y="252" width="114" height="15" rx="4" fill="#16a34a"/>
<text x="605.9634146341464" y="264" font-size="9" fill="#16a34a" font-weight="700" text-anchor="start">R 623</text>
<text x="486" y="286" font-size="9.5" fill="#475569" font-weight="400" text-anchor="start">51% asymmetry — left weaker → train it</text>
<text x="486" y="320" font-size="10.5" fill="#0f172a" font-weight="700" text-anchor="start">Limits of Stability (lean)</text>
<line x1="545" y1="360" x2="545" y2="331" stroke="#2563eb" stroke-width="3"/>
<line x1="545" y1="360" x2="545" y2="374" stroke="#2563eb" stroke-width="3"/>
<line x1="545" y1="360" x2="541" y2="360" stroke="#2563eb" stroke-width="3"/>
<line x1="545" y1="360" x2="549" y2="360" stroke="#2563eb" stroke-width="3"/>
<circle cx="545" cy="360" r="2.5" fill="#0f172a"/>
<text x="557" y="338" font-size="8.5" fill="#64748b" font-weight="400" text-anchor="start">fwd 104</text><text x="557" y="376" font-size="8.5" fill="#64748b" font-weight="400" text-anchor="start">back 49</text><text x="557" y="362" font-size="8.5" fill="#64748b" font-weight="400" text-anchor="start">L/R 15</text>
<text x="660" y="356" font-size="9" fill="#64748b" font-weight="400" text-anchor="start">A/P &gt; M/L (foot is longer than</text><text x="660" y="369" font-size="9" fill="#64748b" font-weight="400" text-anchor="start">wide) — compare within an axis.</text>
<text x="24" y="430" font-size="10.5" fill="#e11d48" font-weight="700" text-anchor="start">Read: vision-reliant, and foam + eyes-shut is the failure mode → a vestibular contribution and real fall risk; left leg weaker.</text>
<text x="24" y="452" font-size="10" fill="#64748b" font-weight="400" text-anchor="start">Same ~$100 rig, same 8 sensors — now a full sensory-organization + stability screen.</text>
</svg>
