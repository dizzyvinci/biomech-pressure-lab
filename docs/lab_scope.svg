<text x="775" y="152" font-size="8.5" fill="#ffffff" font-weight="700" text-anchor="middle">PARTIAL</text>
<text x="742" y="172" font-size="8" fill="#64748b" font-weight="400" text-anchor="start">r≈0.87</text>
