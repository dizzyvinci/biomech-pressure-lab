<text x="742" y="232" font-size="8" fill="#64748b" font-weight="400" text-anchor="start">coarse map</text>
<rect x="24" y="244" width="852" height="56" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
