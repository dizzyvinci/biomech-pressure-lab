<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
<title>Personal-lab equipment scope: in-shoe pressure (papers: pedar capacitive RMSE 2.6 kPa $10-30k; us: FSR insole r0.87 PARTIAL), full-foot pressure map (emed/MatScan 1.4-2 sensors/cm2; us: 3D-printed Velostat copper-matrix mat ~$40 PARTIAL), vertical GRF (AMTI/Kistler $5-30k; us: 4 load cells + HX711 + printed plate ~$80, ICC&gt;0.94 YES), shear/6-axis (tri-axial transducers; us: GAP, can't DIY), GRF from motion (Vicon; us: phone pose AI free YES), calibration (us: known weights YES). ~$150-250 of parts + the H2D gets trend-level versions of 4 of 6.</title>
<desc>A scope table: measurement, what the papers use, our DIY build, and whether we can match (partial/yes/gap).</desc>
<defs><marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#64748b"/></marker><marker id="arr" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#e11d48"/></marker></defs>
<rect x="4" y="4" width="892" height="492" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
<text x="24" y="36" font-size="18" fill="#0f172a" font-weight="700" text-anchor="start">Personal-lab scope — catching up to the papers' equipment</text><text x="24" y="55" font-size="11.5" fill="#475569" font-weight="400" text-anchor="start">What the cited studies used vs what we can 3D-print / DIY — and the honest gaps</text>
<text x="40" y="104" font-size="9.5" fill="#64748b" font-weight="700" text-anchor="start">Measurement</text>
<text x="196" y="104" font-size="9.5" fill="#64748b" font-weight="700" text-anchor="start">The papers use ($$$)</text>
<text x="452" y="104" font-size="9.5" fill="#64748b" font-weight="700" text-anchor="start">Our DIY build (3D-print + buy)</text>
<text x="742" y="104" font-size="9.5" fill="#64748b" font-weight="700" text-anchor="start">Match?</text>
<line x1="24" y1="112" x2="876" y2="112" stroke="#e2e8f0"/>
