<text x="196" y="144" font-size="8.5" fill="#475569" font-weight="400" text-anchor="start">pedar / F-Scan (capacitive,</text>
<text x="196" y="158" font-size="8.5" fill="#475569" font-weight="400" text-anchor="start">RMSE 2.6 kPa · $10–30k)</text>
<text x="452" y="144" font-size="8.5" fill="#475569" font-weight="400" text-anchor="start">FSR insole (have) + calib.py</text>
<text x="452" y="158" font-size="8.5" fill="#475569" font-weight="400" text-anchor="start">power-law — resistive, drifts</text>
