<text x="775" y="392" font-size="8.5" fill="#ffffff" font-weight="700" text-anchor="middle">YES</text>
<text x="742" y="412" font-size="8" fill="#64748b" font-weight="400" text-anchor="start">2D</text>
<rect x="24" y="424" width="852" height="56" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="40" y="446" font-size="10" fill="#0f172a" font-weight="700" text-anchor="start">Calibration</text>
<text x="196" y="444" font-size="8.5" fill="#475569" font-weight="400" text-anchor="start">materials tester /</text>
<text x="196" y="458" font-size="8.5" fill="#475569" font-weight="400" text-anchor="start">reference loads</text>
<text x="452" y="444" font-size="8.5" fill="#475569" font-weight="400" text-anchor="start">known weights →</text>
<text x="452" y="458" font-size="8.5" fill="#475569" font-weight="400" text-anchor="start">calibrate.py</text>
<rect x="742" y="438" width="66" height="20" rx="10" fill="#16a34a"/>
<text x="775" y="452" font-size="8.5" fill="#ffffff" font-weight="700" text-anchor="middle">YES</text>
<text x="742" y="472" font-size="8" fill="#64748b" font-weight="400" text-anchor="start">R²=1.0 demo</text>
<text x="24" y="476" font-size="9.5" fill="#0f172a" font-weight="700" text-anchor="start">The H2D prints every frame/enclosure. ~$150–250 of parts → trend-level versions of 4 of 6; SHEAR + lab-grade accuracy stay out of reach.</text>
<text x="24" y="492" font-size="9" fill="#64748b" font-weight="400" text-anchor="start">That's the whole ethos: r≈0.87, not 1.0 — a ~$250 lab that does what a ~$30k one does at trend level. Sources in refs/plantar_norms.json + lab_scope.md.</text>
