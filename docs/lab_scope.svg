<text x="196" y="324" font-size="8.5" fill="#475569" font-weight="400" text-anchor="start">tri-axial transducers,</text>
<text x="196" y="338" font-size="8.5" fill="#475569" font-weight="400" text-anchor="start">6-axis plates (custom)</text>
<text x="452" y="324" font-size="8.5" fill="#475569" font-weight="400" text-anchor="start">— no maker-grade option</text>
<text x="452" y="338" font-size="8.5" fill="#475569" font-weight="400" text-anchor="start">(shear is hard)</text>
<rect x="742" y="318" width="66" height="20" rx="10" fill="#e11d48"/>
<text x="775" y="332" font-size="8.5" fill="#ffffff" font-weight="700" text-anchor="middle">GAP</text>
