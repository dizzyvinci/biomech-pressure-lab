<text x="775" y="272" font-size="8.5" fill="#ffffff" font-weight="700" text-anchor="middle">YES</text>
<text x="742" y="292" font-size="8" fill="#64748b" font-weight="400" text-anchor="start">ICC&gt;0.94</text>
