<svg viewBox="0 0 900 470" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
<title>Closed loop with real worked-example numbers: wear &amp; log, calibrate to kPa (R2=1.0), interpret (heel_med 645 kPa), build_insole.py, print on H2D, re-measure and iterate.</title>
<desc>Six connected steps in an S-layout with a loop-back arrow, each labeled with the script and its output.</desc>
<defs><marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#64748b"/></marker><marker id="arr" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#e11d48"/></marker></defs>
<rect x="4" y="4" width="892" height="462" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
<text x="24" y="36" font-size="18" fill="#0f172a" font-weight="700" text-anchor="start">Measure → design → print → re-measure (with real numbers)</text><text x="24" y="55" font-size="11.5" fill="#475569" font-weight="400" text-anchor="start">The committed worked example, end to end — every box is a script you can run</text>
<rect x="34" y="92" width="250" height="92" rx="10" fill="#eef2f7" stroke="#94a3b8" stroke-width="1.6"/>
<text x="48" y="116" font-size="12.5" fill="#0f172a" font-weight="700" text-anchor="start">1 · Wear &amp; log</text>
<text x="48" y="136" font-size="9.5" fill="#475569" font-weight="400" text-anchor="start">shoe + barefoot, all day</text>
<text x="48" y="151" font-size="9.5" fill="#475569" font-weight="400" text-anchor="start">FSR ×8 + IMU → microSD</text>
<rect x="324" y="92" width="250" height="92" rx="10" fill="#fdecef" stroke="#e11d48" stroke-width="1.6"/>
<text x="338" y="116" font-size="12.5" fill="#0f172a" font-weight="700" text-anchor="start">2 · calibrate.py</text>
<text x="338" y="136" font-size="9.5" fill="#475569" font-weight="400" text-anchor="start">known weights → F=a·G^b</text>
<text x="338" y="151" font-size="9.5" fill="#475569" font-weight="400" text-anchor="start">R² = 1.00 → real kPa</text>
<rect x="614" y="92" width="250" height="92" rx="10" fill="#eef2f7" stroke="#94a3b8" stroke-width="1.6"/>
<text x="628" y="116" font-size="12.5" fill="#0f172a" font-weight="700" text-anchor="start">3 · interpret.py</text>
<text x="628" y="136" font-size="9.5" fill="#475569" font-weight="400" text-anchor="start">heel_med 645 kPa (40%)</text>
<text x="628" y="151" font-size="9.5" fill="#475569" font-weight="400" text-anchor="start">medial pronation · +13 pts shoe</text>
<rect x="614" y="238" width="250" height="92" rx="10" fill="#fdecef" stroke="#e11d48" stroke-width="1.6"/>
<text x="628" y="262" font-size="12.5" fill="#0f172a" font-weight="700" text-anchor="start">4 · build_insole.py</text>
<text x="628" y="282" font-size="9.5" fill="#475569" font-weight="400" text-anchor="start">aggressive heel relief +</text>
<text x="628" y="297" font-size="9.5" fill="#475569" font-weight="400" text-anchor="start">medial post → .scad/.stl</text>
<rect x="324" y="238" width="250" height="92" rx="10" fill="#eef2f7" stroke="#94a3b8" stroke-width="1.6"/>
<text x="338" y="262" font-size="12.5" fill="#0f172a" font-weight="700" text-anchor="start">5 · H2D prints</text>
<text x="338" y="282" font-size="9.5" fill="#475569" font-weight="400" text-anchor="start">soft TPU 85A heel/relief</text>
<text x="338" y="297" font-size="9.5" fill="#475569" font-weight="400" text-anchor="start">+ firm TPU 95A shell</text>
<rect x="34" y="238" width="250" height="92" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.6"/>
<text x="48" y="262" font-size="12.5" fill="#0f172a" font-weight="700" text-anchor="start">6 · Re-measure</text>
<text x="48" y="282" font-size="9.5" fill="#475569" font-weight="400" text-anchor="start">did heel load drop?</text>
<text x="48" y="297" font-size="9.5" fill="#475569" font-weight="400" text-anchor="start">iterate the window</text>
<line x1="290" y1="138.0" x2="320" y2="138.0" stroke="#64748b" stroke-width="1.8" marker-end="url(#ar)"/>
<line x1="580" y1="138.0" x2="610" y2="138.0" stroke="#64748b" stroke-width="1.8" marker-end="url(#ar)"/>
<line x1="739.0" y1="190" x2="739.0" y2="234" stroke="#64748b" stroke-width="1.8" marker-end="url(#ar)"/>
<line x1="608" y1="284.0" x2="578" y2="284.0" stroke="#64748b" stroke-width="1.8" marker-end="url(#ar)"/>
<line x1="318" y1="284.0" x2="288" y2="284.0" stroke="#64748b" stroke-width="1.8" marker-end="url(#ar)"/>
<path d="M159.0 238 L159.0 214 L159.0 190" fill="none" stroke="#16a34a" stroke-width="1.8" marker-end="url(#ar)"/>
<text x="167.0" y="208" font-size="9" fill="#16a34a" font-weight="700" text-anchor="start">iterate</text>
<text x="24" y="440" font-size="10.5" fill="#64748b" font-weight="400" text-anchor="start">Calibration is the hinge: raw FSRs are nonlinear — without it the hot spot reads wrong. With it, every number above is real kPa.</text>
</svg>
