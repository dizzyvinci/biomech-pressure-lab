<svg viewBox="0 0 900 470" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
<title>The wearable setup: 8 FSRs in a thin foot sole, a ribbon up to an ankle pod holding the ESP32, LiPo and microSD; swap the sole between shoe and barefoot.</title>
<desc>Left: a foot (bottom view) with eight red FSR dots and a ribbon leaving the instep. Center: the ribbon runs to an ankle pod labeled ESP32, LiPo, microSD, USB-C charge, button. Right: two modes — a strapped barefoot sole and an in-shoe insole — sharing the same pod.</desc>
<rect x="4" y="4" width="892" height="462" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
<text x="24" y="36" font-size="19" font-weight="700" fill="#0f172a">The wearable setup — where the hardware sits</text>
<text x="24" y="56" font-size="12" fill="#e11d48">Electronics stay OFF the foot · swap the sole for shoe vs barefoot · ~8–14 h on a 1000–1500 mAh LiPo</text>
<defs><marker id="a" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#64748b"/></marker></defs>

<!-- foot (bottom view) with FSR dots -->
<g transform="translate(6,44) scale(0.72)">
  <path d="M170 440 C135 440 112 428 112 400 C96 350 96 300 104 250 C108 210 106 165 116 128 C120 100 145 94 162 100 C180 92 200 96 206 122 C226 165 232 210 230 255 C236 320 230 400 218 424 C210 440 192 440 170 440 Z" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
  <g fill="#e11d48">
    <circle cx="131" cy="420" r="10"/><circle cx="209" cy="420" r="10"/><circle cx="170" cy="288" r="10"/><circle cx="118" cy="190" r="10"/>
    <circle cx="170" cy="180" r="10"/><circle cx="222" cy="190" r="10"/><circle cx="116" cy="116" r="10"/><circle cx="183" cy="104" r="10"/>
  </g>
</g>
<text x="120" y="410" font-size="11" font-weight="700" fill="#0f172a" text-anchor="middle">Foot sensor sole</text>
<text x="120" y="426" font-size="9.5" fill="#64748b" text-anchor="middle">8 flat FSRs in pockets (soft TPU)</text>

<!-- ribbon from instep up to pod -->
<path d="M108 220 C 200 200, 250 180, 300 175" fill="none" stroke="#64748b" stroke-width="2.2" marker-end="url(#a)"/>
<text x="215" y="176" font-size="9" fill="#64748b" text-anchor="middle">thin ribbon</text>

<!-- ankle pod -->
<rect x="300" y="120" width="180" height="110" rx="10" fill="#eef2f7" stroke="#94a3b8" stroke-width="1.6"/>
<text x="390" y="146" font-size="14" font-weight="700" fill="#0f172a" text-anchor="middle">Ankle pod</text>
<text x="390" y="167" font-size="10.5" fill="#475569" text-anchor="middle">ESP32-S3 · LiPo · microSD</text>
<text x="390" y="184" font-size="10.5" fill="#475569" text-anchor="middle">USB-C charge · button</text>
<text x="390" y="209" font-size="9.5" fill="#64748b" text-anchor="middle">clips to ankle / laces</text>
<text x="390" y="252" font-size="10" fill="#e11d48" text-anchor="middle">logs continuously → SD → analyze at day's end</text>

<!-- two modes -->
<text x="560" y="112" font-size="12" font-weight="700" fill="#334155">Same pod, swap the sole:</text>

<rect x="560" y="126" width="300" height="66" rx="9" fill="#f8fafc" stroke="#cbd5e1"/>
<circle cx="592" cy="159" r="16" fill="#fdecef" stroke="#e11d48"/><text x="592" y="163" font-size="12" fill="#e11d48" text-anchor="middle">🦶</text>
<text x="622" y="152" font-size="12" font-weight="700" fill="#0f172a">Barefoot mode</text>
<text x="622" y="169" font-size="10" fill="#64748b">strapped TPU sole on the bare foot</text>
<text x="622" y="184" font-size="10" fill="#64748b">→ your natural, unshod loading</text>

<rect x="560" y="204" width="300" height="66" rx="9" fill="#f8fafc" stroke="#cbd5e1"/>
<circle cx="592" cy="237" r="16" fill="#eef2f7" stroke="#94a3b8"/><text x="592" y="241" font-size="12" text-anchor="middle">👟</text>
<text x="622" y="230" font-size="12" font-weight="700" fill="#0f172a">In-shoe mode</text>
<text x="622" y="247" font-size="10" fill="#64748b">same carrier slipped into the shoe</text>
<text x="622" y="262" font-size="10" fill="#64748b">→ how your footwear changes it</text>

<text x="480" y="300" font-size="11" fill="#475569" text-anchor="middle">Long-press the button to switch shoe ⇄ barefoot — the analysis then reports the difference.</text>

<!-- footer -->
<line x1="20" y1="330" x2="880" y2="330" stroke="#e2e8f0"/>
<text x="24" y="356" font-size="11.5" font-weight="700" fill="#0f172a">Why the pod is at the ankle, not underfoot</text>
<text x="24" y="376" font-size="11" fill="#475569">A rigid ESP32 + battery underfoot is unwearable. Only the thin FSRs + wiring go on the foot;</text>
<text x="24" y="392" font-size="11" fill="#475569">all the bulk lives in the ankle pod, joined by a slim ribbon — comfortable to wear most of a day.</text>
<text x="24" y="420" font-size="10.5" fill="#64748b">Print files: hardware/ankle_pod.scad · hardware/barefoot_sole.scad · firmware/all_day_logger</text>
</svg>
